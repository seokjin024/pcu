<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>정수 5개 입력받아 역순으로 출력</title>
</head>
<body>
<h3>정수 5개 입력받아 역순으로 출력</h3>
<hr>
<script>
    let numbers = [];
    for(let i=0; i<5; i++){
        let n = prompt("정수 입력");
        numbers.push(parseInt(n));
    }
    document.write("입력된 수의 배열<br>")
    for(let i = 0; i < numbers.length; i++ ){
        document.write(numbers[i] + " ")
    }
    document.write("<hr>");

    numbers.reverse();

    document.write("역순으로 재정렬된 배열<br>")
    for(let i = 0; i < numbers.length; i++ ){
        document.write(numbers[i] + " ")
    }


</script>
</body>
</html>

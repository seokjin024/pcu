<!DOCTYPE html>
<html>
    <head>
        <title>갓생 살기</title>
        <style>
            html, body {margin: 0; padding: 0; height: 100%; }
            header { width: 100%; height: 10%;}
            section {width: 70%; height: 70%; float: left;}
        </style>
    </head>
    <body>
        <header><h1>주간 '갓생 살기' 플래너</h1></header>
        <hr>
        <section>
            <h3>공부 목표 설정</h3>
        공부 과목 : <input type="text" list="subject">
        <datalist id="subject">
            <option value="국어"></option>
            <option value="수학"></option>
            <option value="영어"></option>
            <option value="과학"></option>
            <option value="한국사"></option>
        </datalist><br>
        목표 공부 시간 : <select name="time">
            <option value="1">1시간</option>
            <option value="2">2시간</option>
            <option value="3">3시간</option>
            <option value="4">4시간 이상</option>
        </select><br>
        공부량 : <input type="text">
        </section>




    </body>
</html>
